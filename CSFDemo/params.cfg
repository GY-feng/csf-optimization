// ======================================================================================
// params.cfg — CSF 算法的参数配置文件
// 每行格式：key=value
// CSFDemo 启动时会逐行解析这个文件，把值传给 CSF.params
// ======================================================================================

// 输入点云文件路径（相对路径或绝对路径，.txt 格式，每行 X Y Z 三个坐标）
terr_pointClouds_filepath=samp311.txt

// 是否开启坡度平滑后处理
// true:  模拟结束后，对布料上仍然悬空的粒子做额外处理，
//        找到它们附近已"落地"的粒子，如果高度差不大就也拉到地面
//        这样可以修复山坡边缘的误分类问题
// false: 不做后处理，速度稍快但坡面效果差
slop_smooth=true

// 布料网格的分辨率（单位：米）
// 就是布料上相邻两个粒子之间的水平距离
// 0.5 = 每0.5米一个粒子，精度高但粒子多、计算慢
// 1.0 = 每1米一个粒子，速度快但可能漏掉小地形特征
// 这个参数直接决定了布料粒子总数，对性能影响最大
cloth_resolution=0.5//真实项目设置为0.05

// 布料的刚性等级，只能取 1、2、3
// 1 = 软：约束校正系数小，布料容易变形，适合地形起伏大的区域
// 2 = 中：介于1和3之间
// 3 = 硬：约束校正系数大，布料不容易变形，适合平坦区域
// 刚性越强，布料越不容易"穿过"建筑物顶部，越容易保持在地面
// 但在地形起伏大的区域，刚性太强会导致布料贴合不好
rigidness=3//实际取1

// 物理模拟的最大迭代次数
// 每次迭代：粒子做一次 Verlet 积分（下落）+ 约束校正（拉平）+ 碰撞检测（不穿过地面）
// 500 是经验默认值，实际中布料通常在 200-300 次后就收敛了（有早停机制）
// 增大此值不会变慢太多（因为有早停），但减小可能导致布料还没落到底就停了
iterations=500

// 地面/非地面的分类距离阈值（单位：米）
// 模拟结束后，计算每个原始点到布面的距离
// 距离 < 0.5米 → 认为是地面点
// 距离 >= 0.5米 → 认为是非地面点（建筑物、树木等）
// 如果点云噪声大，可以适当增大此值
class_threshold=0.5

// 物理模拟的时间步长
// 影响每次迭代中粒子移动的幅度
// 太大 → 粒子一步跨太远，可能穿过地面
// 太小 → 收敛慢，需要更多迭代
// 0.65 是经验最优值
time_step=0.65//实际采用0.5
